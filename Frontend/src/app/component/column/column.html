<div class="container" [cdkDropListData]="column().id" cdkDropList (cdkDropListDropped)="drop($event)">
	<header>
		<h2>{{ column().name }}</h2>
		<div class="count">{{ column().tickets.length }}</div>
	</header>
	@for (ticket of column().tickets; track $index) {
		<app-column-ticket
			[ticket]="ticket"
			cdkDrag
		/>
	}
</div>
