<header>
	<div class="number">{{ ticket()?.number }}</div>
	<textarea class="h1" (keyup)="setTitle($event)" (keydown)="disableNewLine($event)">{{ ticket()?.title }}</textarea>
</header>
<section class="toolbar">
	<button class="close" routerLink="/"><i class="bi bi-arrow-return-left"></i></button>
	<button class="save" (click)="save()" [disabled]="!this.isDirty()"><i class="bi bi-floppy2-fill"></i> Save</button>
</section>
<section>
	<textarea placeholder="No description." class="description" (keyup)="setDescription($event)">{{ ticket()?.description }}</textarea>
</section>
